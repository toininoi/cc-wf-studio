name: Release — Publish

# Manual publish. Run this from the Actions UI once a "Version Packages" PR
# has been merged into main and main has been promoted to production. It
# publishes every package whose version is ahead of the registry, creates the
# git tags + GitHub releases, and (when the VSCode extension was bumped)
# builds and uploads the VSIX.
#
# npm authentication uses OIDC Trusted Publishing — no NPM_TOKEN secret. Each
# of @cc-wf-studio/{core,mcp,cli} must have a Trusted Publisher configured on
# npmjs.com pointing at this repository + this workflow file.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag to publish from (defaults to production)'
        required: false
        default: 'production'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    name: Publish from ${{ inputs.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Publish (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Detect VSCode extension release
        id: detect-vsix
        run: |
          # changeset publish tags the production commit (e.g. cc-wf-studio@3.35.0)
          # when the extension version was bumped. Look for that tag at HEAD.
          NEW_TAG=$(git tag --points-at HEAD | grep '^cc-wf-studio@' | head -1 || true)
          if [ -n "$NEW_TAG" ]; then
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "needs_vsix=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_vsix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        run: pnpm --filter cc-wf-studio run package

      - name: Upload VSIX to GitHub Release
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VSIX_TAG: ${{ steps.detect-vsix.outputs.tag }}
        run: |
          VSIX_FILE=$(ls packages/vscode/*.vsix)
          gh release upload "$VSIX_TAG" "$VSIX_FILE" --clobber
